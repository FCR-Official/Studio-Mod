<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Studio - Universal Compiler Ecosystem</title>
    <link rel="icon" type="image/png" href="costume1 (24).png">
    
    <style>
        :root {
            --bg-black: #000000;
            --panel-dark: #050505;
            --panel-card: #0a0a0a;
            --logo-dark-green: #035338;
            --logo-dark-green-glow: rgba(3, 83, 56, 0.4);
            --text-main: #ffffff;
            --text-muted: #8e8e8e;
            
            /* Dynamic accent handled by runtime javascript */
            --user-accent: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
        }

        .mod-studio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 2rem;
            background-color: var(--panel-dark);
            border-bottom: 2px solid var(--logo-dark-green);
        }

        .header-brand { display: flex; align-items: center; gap: 1rem; text-decoration: none; }
        .header-logo { width: 45px; height: 45px; object-fit: contain; border-radius: 50%; }
        .header-title { font-size: 1.5rem; font-weight: 700; color: var(--text-main); }
        .header-title span { color: var(--logo-dark-green); }

        .workspace-container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
        }

        /* Customizer Tool Panel Styling */
        .control-panel {
            background: var(--panel-card);
            border: 1px solid #1f1f1f;
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #000;
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid #222;
        }

        input[type="color"] {
            border: none;
            background: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        .text-input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: monospace;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }

        .launcher-btn {
            background: #050505;
            border: 1px solid var(--logo-dark-green);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
            text-align: center;
        }
        .launcher-btn:hover { background: var(--logo-dark-green); }

        .code-box-wrapper {
            background-color: var(--panel-card);
            border: 1px solid #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .code-header {
            background-color: var(--panel-dark);
            padding: 0.75rem 1.2rem;
            border-bottom: 1px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        pre { margin: 0; padding: 1.5rem; background: #000000; overflow-x: auto; flex-grow: 1; }
        code { font-family: 'Consolas', monospace; color: var(--user-accent); font-size: 0.9rem; }
        .btn-action { background: transparent; color: #fff; border: 1px solid var(--logo-dark-green); padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <header class="mod-studio-header">
        <a href="#" class="header-brand">
            <img src="costume1 (24).png" alt="Logo" class="header-logo">
            <div class="header-title">Mod<span>Studio</span> Live</div>
        </a>
        <button class="btn-action" onclick="downloadConfig()">Download JSON</button>
    </header>

    <main class="workspace-container">
        <section class="control-panel">
            <h3>🎨 Design Workspace</h3>
            <hr style="border: 0; border-top: 1px solid #1f1f1f; margin: 0;">
            
            <div class="control-group">
                <label>Main Accent (Operators/Time)</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="accentColor" value="#10b981" oninput="updateThemeRuntime()">
                    <input type="text" id="accentText" value="#10b981" class="text-input" readonly>
                </div>
            </div>

            <div class="control-group">
                <label>Block Background Fill</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="blockColor" value="#000000" oninput="updateThemeRuntime()">
                    <input type="text" id="blockText" value="#000000" class="text-input" readonly>
                </div>
            </div>

            <button class="launcher-btn" onclick="syncActiveSettings()" style="background-color: #035338; margin-top: 1rem;">
                ⚡ Sync Custom Changes
            </button>
            
            <p style="font-size: 0.75rem; color: var(--text-muted); margin: 0; line-height: 1.4;">
                Adjust color configurations above, click Sync, and refresh your Scratch or TurboWarp editor tab!
            </p>
        </section>

        <section class="code-box-wrapper">
            <div class="code-header">
                <span>live-generation-matrix.json</span>
                <button class="btn-action" onclick="copyToClipboard()">Copy Payload</button>
            </div>
            <pre><code id="jsonContainer">Generating data blocks...</code></pre>
        </section>
    </main>

    <script>
        function updateThemeRuntime() {
            const accent = document.getElementById("accentColor").value;
            const blockFill = document.getElementById("blockColor").value;
            
            document.getElementById("accentText").value = accent;
            document.getElementById("blockText").value = blockFill;
            
            // Adjust local page preview highlights dynamically
            document.documentElement.style.setProperty('--user-accent', accent);

            // Dynamically reconstruct the compiler configuration file structure
            const realTimeConfig = {
                "themeStyle": {
                    "primaryAccent": accent,
                    "canvasBackground": blockFill,
                    "inputFill": blockFill
                },
                "overrides": {
                    "forceCloneToEvents": true,
                    "enableStopSignHat": true,
                    "injectTimeBlocks": true
                }
            };

            document.getElementById("jsonContainer").innerText = JSON.stringify(realTimeConfig, null, 2);
        }

        function syncActiveSettings() {
            const activeCodePayload = document.getElementById("jsonContainer").innerText;
            window.postMessage({ type: "MOD_STUDIO_SYNC", payload: JSON.parse(activeCodePayload) }, "*");
            alert("🎯 Configurations updated! Your specific color schemes are locked into browser engine paths.");
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById("jsonContainer").innerText).then(() => {
                alert("🎯 Configuration copied!");
            });
        }

        function downloadConfig() {
            const dataStream = "data:text/plain;charset=utf-8," + encodeURIComponent(document.getElementById("jsonContainer").innerText);
            const anchor = document.createElement('a');
            anchor.setAttribute("href", dataStream);
            anchor.setAttribute("download", "mod-studio-custom.json");
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
        }

        window.onload = updateThemeRuntime;
    </script>
</body>
</html>

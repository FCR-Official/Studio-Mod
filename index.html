<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio Mod</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
    <div class="logo">
        Studio Mod
    </div>

    <button id="loginButton">
        Sign in with Google
    </button>
</header>


<main>

<section class="welcome">

<h1>
Welcome to Studio Mod
</h1>

<p>
A community platform inspired by Scratch Studios.
</p>

</section>



<section class="welcome">
    Welcome section
</section>


<section class="profile">
    <!-- Replace the old Account section with the Profile editor here -->
</section>


<section class="studios">
    Studios section
</section>


<section class="studios">

<h2>
Studios
</h2>


<div class="studio-create">

<h3>
Create a Studio
</h3>

<input 
id="studioName"
placeholder="Studio name"
>


<textarea 
id="studioDescription"
placeholder="Description"
></textarea>


<input
type="file"
id="studioBanner"
accept="image/*"
>


<button onclick="createStudio()">
Create Studio
</button>

</div>



<h3>
Your Studios
</h3>


<div id="studioList">

</div>


</section>


</main>


<script src="login.js"></script>

</body>

</html>

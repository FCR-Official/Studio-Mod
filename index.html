<!DOCTYPE html>
<html lang="en">

<header>

<img 
src="costume1 (24).png"
class="home-icon"
onclick="goHome()"
>


<div class="logo">
Studio Mod
</div>


<button id="loginButton">
Sign in with Google
</button>

</header>


<main>

<section id="homePage">


<h2>
Home
</h2>


<p>
Share your projects with everyone!
</p>



<div class="project-create">

<h3>
Create Project
</h3>


<input 
id="projectName"
placeholder="Project name"
>


<textarea 
id="projectDescription"
placeholder="Description"
></textarea>


<button onclick="createProject()">
Share Project
</button>


</div>



<h3>
Projects
</h3>


<div id="projectList">

</div>


</section>

<section class="studios">
    Studios section
</section>


<section class="studios">

<h2>
Studios
</h2>


<div class="studio-create">

<h3>
Create a Studio
</h3>

<input 
id="studioName"
placeholder="Studio name"
>


<textarea 
id="studioDescription"
placeholder="Description"
></textarea>


<input
type="file"
id="studioBanner"
accept="image/*"
>


<button onclick="createStudio()">
Create Studio
</button>

</div>



<h3>
Your Studios
</h3>


<div id="studioList">

</div>


</section>


</main>


<script src="login.js"></script>

</body>

</html>
